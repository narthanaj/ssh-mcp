name: Bug Report
description: Report a bug in ssh-mcp
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the details below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Configure ssh-mcp with...
        2. Connect to host...
        3. Execute command...
        4. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages and logs if available.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: ssh-mcp Version
      description: Output of `ssh-mcp --version` or the version in Cargo.toml.
      placeholder: "0.1.0"

  - type: input
    id: rust-version
    attributes:
      label: Rust Version
      description: Output of `rustc --version`.
      placeholder: "rustc 1.85.0"

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux
        - macOS
        - Windows (WSL)
        - Other
