name: Feature Request
description: Suggest a new feature for ssh-mcp
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe what you'd like.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? What use case does it address?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How do you think this should work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you've considered.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of ssh-mcp does this relate to?
      options:
        - MCP Tools
        - MCP Resources
        - MCP Prompts
        - SSH Connection
        - Command Validation / Security
        - Configuration
        - Performance
        - Documentation
        - Other
